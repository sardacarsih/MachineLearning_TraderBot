# Copy this file to credentials.yaml or another credentials_<symbol>.yaml file.
# Keep real credential files local. They are ignored by Git.

mt5:
  login: 0
  password: ""
  server: ""
  terminal_path: ""
  magic_number: 202401
  paper_trading: true
  trading_enabled: false
  safety_max_lot: 0.01
  account_currency: "AUTO"
  risk_quote_currency: "USD"
  usd_idr_rate_mode: "broker"
  usd_idr_fallback_rate: 16400.0
  margin_reserve_pct: 0.10

risk:
  max_risk_per_trade: 0.01
  high_confidence_threshold: 0.75
  high_confidence_lot_multiplier: 1.0
  # Live default: true. For research-only runs, set false to bypass this cooldown.
  consecutive_loss_cooldown_enabled: true
  consecutive_loss_cooldown_count: 3
  consecutive_loss_cooldown_hours: 4.0

confidence:
  default:
    signal_threshold: 0.50
    high_confidence_threshold: 0.70
    high_confidence_lot_multiplier: 2.0
  by_timeframe:
    M1:
      signal_threshold: 0.58
      high_confidence_threshold: 0.76
      high_confidence_lot_multiplier: 1.0
  by_symbol:
    XAUUSD:
      signal_threshold: 0.55
      high_confidence_threshold: 0.72
      high_confidence_lot_multiplier: 1.5
  by_symbol_timeframe:
    XAUUSD:
      M5:
        signal_threshold: 0.60
        high_confidence_threshold: 0.75
        high_confidence_lot_multiplier: 1.0
